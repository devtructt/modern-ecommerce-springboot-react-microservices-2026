server:
  port: 8083

spring:
  application:
    name: search-suggestion-service

cors:
  allowed-origins: "https://shoppers-ecom-app.herokuapp.com,http://localhost:3000"
  allowed-methods: "GET,POST,OPTIONS,DELETE"

services:
  common-data:
    base-url: http://common-data-service:8082
    endpoints:
      search-suggestion-list: ${services.common-data.base-url}/search-suggestion-list